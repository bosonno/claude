<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Background + GIF</title>

<style>
html,body{
  height:100%;
  margin:0;
  overflow:hidden;
}

/* background image */
.bg{
  position:fixed;
  inset:0;
  background:url("bg.png") center/cover no-repeat;
}

/* dark gradient to force black bottom */
.bg::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:40%;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.4) 40%,
    rgba(0,0,0,0.8) 97%,
    rgba(0,0,0,1) 100%
  );
}

/* animated gif */
#claude{
  position:fixed;
  left:50%;
  bottom:0;
  transform:translateX(-50%);
  max-height:90vh;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="bg"></div>
<script>
  const h = new Date().getHours();
  document.querySelector('.bg').style.backgroundImage = h >= 6 && h < 20 ? 'url("sun.png")' : 'url("moon.png")';
</script>
<img id="claude" src="claude.gif">

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

</body>
</html>
